<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pixielabsgames | Unblocked</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo-container">
            <div class="logo-icon"></div> <h1>pixielabsgames</h1>
        </div>
    </header>

    <main>
        <section class="popular-section">
            <h2>Popular:</h2>
            <div class="grid-popular">
                <div class="game-card large"><img src="images/vex6.png" alt="Vex 6"></div>
                <div class="game-card large"><img src="images/monster-truck.png" alt="Drive Mad"></div>
                <div class="side-column">
                    <div class="game-card small"><img src="images/bob-robber.png" alt="Bob the Robber"></div>
                    <div class="game-card small"><img src="images/vex7.png" alt="Vex 7"></div>
                </div>
            </div>
        </section>

        <div class="search-bar">
            <input type="text" placeholder="Search...">
        </div>

        <section class="all-games">
            <div class="grid-standard">
                <div class="game-card"><img src="images/bob-robber.png" alt="Game 1"></div>
                <div class="game-card"><img src="images/vex7.png" alt="Game 2"></div>
                <div class="game-card"><img src="images/vex6.png" alt="Game 3"></div>
                <div class="game-card"><img src="images/minecraft.png" alt="Minecraft"></div>
                <div class="game-card"><img src="images/moto-x3m.png" alt="Moto X3M"></div>
                <div class="game-card"><img src="images/retro-bowl.png" alt="Retro Bowl"></div>
                <div class="game-card"><img src="images/slope.png" alt="Slope"></div>
            </div>
        </section>
    </main>

</body>
</html>
